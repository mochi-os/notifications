[labels]
app.name = ການແຈ້ງເຕືອນ

# Error messages used by a.error.label(...). Generated keys mirror
# the previous hardcoded a.error() literals.
errors.invalid_id = id ບໍ່ຖືກຕ້ອງ
errors.authentication_required = ຕ້ອງການການຢືນຢັນຕົວຕົນ
errors.type_is_required = ຕ້ອງການປະເພດ
errors.invalid_code = ລະຫັດບໍ່ຖືກຕ້ອງ
errors.push_notifications_not_available = ການແຈ້ງເຕືອນ push ບໍ່ສາມາດໃຊ້ໄດ້
errors.feed_name_is_too_long = ຊື່ຟີດຍາວເກີນໄປ
errors.feed_name_is_required = ຕ້ອງການຊື່ຟີດ
errors.failed_to_create_token = ບໍ່ສາມາດສ້າງໂທເຄນ
errors.feed_not_found = ບໍ່ພົບຟີດ
errors.label_is_required = ຕ້ອງການປ້າຍກຳກັບ
errors.invalid_category = ໝວດໝູ່ບໍ່ຖືກຕ້ອງ
errors.not_found = ບໍ່ພົບ
errors.reassign_to_is_required = ຕ້ອງການ reassign_to
errors.could_not_delete = ບໍ່ສາມາດລຶບ
errors.topic_not_found = ບໍ່ພົບຫົວຂໍ້

# Notification self-test title (sent to the user via every category destination).
notifications.body.test = ການແຈ້ງເຕືອນທົດສອບ
notifications.body.test_via_web = ສົ່ງຜ່ານ Mochi web
notifications.body.test_via_account = ສົ່ງຜ່ານ {account}
notifications.account.fcm = ອຸປະກອນ Android
notifications.account.unifiedpush = ອຸປະກອນເຄື່ອນທີ່
notifications.account.email = ອີເມວ
notifications.account.browser = ການແຈ້ງເຕືອນຂອງເບຣົາເຊີ
notifications.account.pushbullet = Pushbullet
notifications.account.ntfy = ntfy
notifications.account.url = URL ພາຍນອກ

# Server upgrade notifications (added by update_manager work)
notifications.app.server = ເຊີບເວີ Mochi
errors.invalid_subscription = ການສະໝັກສະມາຊິກ push ບໍ່ຖືກຕ້ອງ
errors.registration_failed = ການລົງທະບຽນ push ລົ້ມເຫລວ
errors.inbound_not_implemented = ຍັງບໍ່ໄດ້ນຳໃຊ້ປາຍທາງ push ຂາເຂົ້າ
errors.value_too_long = ຄ່າຍາວເກີນໄປ (ສູງສຸດ {maximum} ຕົວອັກສອນ)
